<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local-Only Realtime Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">Local Chat</div>
      <div class="me">
        <img id="myAvatar" class="avatar" alt="me" />
        <div class="me-meta">
          <div id="myName" class="name">You</div>
          <div id="groupStatus" class="subtle">Detecting network…</div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Online (local)</div>
        <ul id="peers" class="peer-list"></ul>
      </div>
      <div class="section">
        <div class="section-title">Voice</div>
        <label class="row">
          <input type="checkbox" id="muteToggle" />
          Mute speech
        </label>
        <label class="row">
          Voice
          <select id="voiceSelect"></select>
        </label>
        <label class="row">
          Rate
          <input type="range" id="rateRange" min="0.5" max="1.5" step="0.05" value="1" />
        </label>
        <label class="row">
          Pitch
          <input type="range" id="pitchRange" min="0.8" max="1.2" step="0.05" value="1" />
        </label>
      </div>
    </aside>

    <main class="main">
      <div id="messages" class="messages" aria-live="polite"></div>
      <div id="typingBar" class="typing" aria-live="polite" aria-atomic="true"></div>
      <form id="composer" autocomplete="off">
        <input id="input" type="text" placeholder="Type a message…" aria-label="Message" required />
        <button id="micBtn" type="button" aria-label="Voice input">🎙️</button>
        <button id="sendBtn" type="submit">Send</button>
      </form>
      <button id="scrollDown" class="scroll-down" aria-label="Scroll to latest">↓</button>
    </main>
  </div>

  <script type="module" src="./main.js"></script>

</body>
</html>
